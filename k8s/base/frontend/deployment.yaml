apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: devops-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: custom-frontend:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80 